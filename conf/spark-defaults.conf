spark.master                             spark://spark-master:7077
spark.eventLog.enabled                   true
spark.eventLog.dir                       file:/opt/spark-events
spark.history.fs.logDirectory            file:/opt/spark-events
spark.history.ui.port                    18080
spark.serializer                         org.apache.spark.serializer.KryoSerializer
spark.sql.adaptive.enabled               true
spark.sql.shuffle.partitions             16
spark.sql.streaming.metricsEnabled       true
spark.sql.ui.retainedExecutions          200
spark.ui.retainedJobs                    200
spark.ui.retainedStages                  200
spark.ui.retainedTasks                   2000
spark.worker.ui.retainedExecutors        50
spark.worker.ui.retainedDrivers          50
spark.driver.bindAddress                 0.0.0.0
spark.driver.host                        spark-client
spark.ui.port                            4040
spark.sql.warehouse.dir                  file:/opt/spark-warehouse
spark.local.dir                          /tmp/spark-local
spark.executor.memory                    1g
spark.driver.memory                      1g
